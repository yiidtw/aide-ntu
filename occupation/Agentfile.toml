[agent]
name = "ntu-student"
version = "0.2.0"
description = "NTU student router — mail, COOL, member sync, dispatch, follow-up"
author = "ydwu"

[persona]
file = "persona.md"

[skills.ntu]
description = "NTU router — mail, cool, read-members, sync, dispatch, follow-up, daily"
usage = "ntu <mail|cool|read-members|sync|dispatch|follow-up|daily>"
schedule = "0 8 * * *"
env = ["EMAIL_USER", "EMAIL_PASS", "COOL_BASE_URL", "ADFS_BASE_URL", "RESEND_API_KEY", "BRIEFING_TO"]

# Legacy skills kept for direct invocation (not scheduled)
[skills.cool]
script = "skills/cool.sh"
description = "NTU COOL (Canvas LMS) — direct access"
usage = "cool [courses|assignments|grades|todos|summary|announcements|scan|submissions]"
env = ["EMAIL_USER", "EMAIL_PASS", "COOL_BASE_URL", "ADFS_BASE_URL"]

[skills.mail]
script = "skills/mail.sh"
description = "NTU mail — direct access"
usage = "mail [check|unread|read N|search Q|send TO SUBJ BODY]"
env = ["EMAIL_USER", "EMAIL_PASS", "POP3_HOST", "SMTP_HOST"]

[skills.cool-watch]
script = "skills/cool-watch.sh"
description = "Watch COOL for delta changes → open GitHub issues (legacy)"
usage = "cool-watch [--dry-run]"
schedule = "0 */4 * * *"
env = ["EMAIL_USER", "EMAIL_PASS", "COOL_BASE_URL", "ADFS_BASE_URL"]

# [expose]
# telegram disabled — conflicts with formace-00 daemon
# telegram = { token_env = "TELEGRAM_BOT_TOKEN" }

[seed]
dir = "seed/"

[env]
required = ["EMAIL_USER", "EMAIL_PASS"]
optional = ["COOL_BASE_URL", "ADFS_BASE_URL", "POP3_HOST", "SMTP_HOST", "EMAIL_DOMAIN", "SMTP_USER", "SMTP_PASS", "POP3_USER", "POP3_PASS", "RESEND_API_KEY", "BRIEFING_TO"]
